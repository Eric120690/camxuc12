<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nhật Ký Cảm Xúc 🌸</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700&display=swap');

        * {
            box-sizing: border-box;
            font-family: 'Quicksand', sans-serif;
            margin: 0;
            padding: 0;
        }

        body {
            background: linear-gradient(135deg, #ffdde1, #ee9ca7);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            color: #555;
        }

        .app-container {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            border-radius: 30px;
            padding: 30px;
            width: 100%;
            max-width: 600px;
            box-shadow: 0 15px 35px rgba(238, 156, 167, 0.3);
        }

        h1 {
            text-align: center;
            color: #ff758c;
            margin-bottom: 10px;
            font-size: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        /* ── Firebase status badge ── */
        .status-bar {
            text-align: center;
            margin-bottom: 20px;
            font-size: 13px;
            font-weight: 700;
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 5px 14px;
            border-radius: 20px;
            background: #f0fdf4;
            color: #16a34a;
            border: 1px solid #bbf7d0;
            transition: all 0.4s;
        }

        .status-badge.connecting {
            background: #fffbeb;
            color: #d97706;
            border-color: #fde68a;
        }

        .status-badge.error {
            background: #fef2f2;
            color: #dc2626;
            border-color: #fecaca;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: currentColor;
        }

        .status-badge.connecting .status-dot {
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        /* ── Controls ── */
        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            justify-content: center;
            margin-bottom: 30px;
            background: #fff0f3;
            padding: 20px;
            border-radius: 20px;
            border: 2px dashed #ffb6c1;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        label {
            font-weight: 700;
            color: #ff758c;
            font-size: 14px;
        }

        select {
            padding: 10px 15px;
            border-radius: 15px;
            border: 1px solid #ffb6c1;
            background: #fff;
            color: #555;
            font-size: 16px;
            outline: none;
            cursor: pointer;
            transition: all 0.3s;
        }

        select:focus {
            box-shadow: 0 0 0 3px rgba(255, 117, 140, 0.2);
        }

        button {
            padding: 10px 25px;
            border: none;
            border-radius: 15px;
            background: linear-gradient(135deg, #ff758c, #ff7eb3);
            color: white;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s, opacity 0.2s;
            align-self: flex-end;
            margin-bottom: 2px;
        }

        button:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255, 117, 140, 0.4);
        }

        button:active:not(:disabled) {
            transform: translateY(0);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* ── Save toast ── */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(80px);
            background: #ff758c;
            color: white;
            padding: 12px 24px;
            border-radius: 20px;
            font-weight: 700;
            font-size: 15px;
            box-shadow: 0 6px 20px rgba(255,117,140,0.4);
            transition: transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
            z-index: 999;
            pointer-events: none;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
        }

        /* ── Calendar ── */
        .calendar {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 10px;
            margin-bottom: 30px;
        }

        .day-box {
            background: white;
            border-radius: 15px;
            padding: 15px 5px;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.03);
            transition: all 0.3s ease;
            position: relative;
            border: 1px solid transparent;
        }

        .day-box:hover {
            transform: translateY(-3px);
            border-color: #ffb6c1;
            box-shadow: 0 6px 15px rgba(255, 182, 193, 0.4);
        }

        .day-box.today {
            border-color: #ff758c;
            box-shadow: 0 0 0 2px #ff758c44;
        }

        .day-num {
            font-size: 12px;
            font-weight: 700;
            color: #aaa;
            margin-bottom: 5px;
        }

        .day-box.today .day-num {
            color: #ff758c;
        }

        .day-emoji {
            font-size: 24px;
        }

        /* ── Stats ── */
        .stats-section {
            background: #fff;
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        .stats-section h3 {
            color: #ff758c;
            text-align: center;
            margin-bottom: 15px;
            font-size: 18px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
            gap: 10px;
            text-align: center;
        }

        .stat-item {
            background: #fff0f3;
            padding: 10px;
            border-radius: 12px;
            font-weight: 700;
            font-size: 14px;
        }

        .stat-item span {
            font-size: 18px;
            margin-right: 5px;
        }

        @media (max-width: 500px) {
            .calendar {
                grid-template-columns: repeat(5, 1fr);
            }
        }
    </style>
</head>
<body>

    <div class="app-container">
        <h1>✨ Trạm Cảm Xúc 🎀</h1>

        <div class="status-bar">
            <div class="status-badge connecting" id="statusBadge">
                <div class="status-dot"></div>
                <span id="statusText">Đang kết nối Firebase…</span>
            </div>
        </div>
        
        <div class="controls">
            <div class="control-group">
                <label for="daySelect">Ngày trong tháng:</label>
                <select id="daySelect"></select>
            </div>
            
            <div class="control-group">
                <label for="emotionSelect">Hôm nay bạn thế nào?</label>
                <select id="emotionSelect">
                    <option value="🥰">🥰 Yêu đời rạng rỡ</option>
                    <option value="😄">😄 Vui vẻ năng lượng</option>
                    <option value="😌">😌 Bình yên thư giãn</option>
                    <option value="🥺">🥺 Hơi xúc động</option>
                    <option value="😫">😫 Mệt mỏi rã rời</option>
                    <option value="😡">😡 Bực mình chói chang</option>
                    <option value="😭">😭 Buồn xỉu up xỉu down</option>
                    <option value="✨">✨ Đầy tự hào</option>
                </select>
            </div>
            
            <button id="saveBtn" onclick="saveEmotion()" disabled>Ghi lại 💕</button>
        </div>

        <div class="calendar" id="calendar"></div>

        <div class="stats-section">
            <h3>📊 Thống kê tháng này của bạn</h3>
            <div class="stats-grid" id="stats"></div>
        </div>
    </div>

    <div class="toast" id="toast">💾 Đã lưu lên cloud! ☁️</div>

    <!-- Firebase SDK (CDN) -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import {
            getFirestore,
            doc,
            setDoc,
            onSnapshot,
            collection
        } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

        // ── Cấu hình Firebase của bạn ──
        const firebaseConfig = {
            apiKey: "AIzaSyCRChnL5wbqiF49ywAcSOWb3rwFV-ij-y0",
            authDomain: "camxuc2026-e83c1.firebaseapp.com",
            projectId: "camxuc2026-e83c1",
            storageBucket: "camxuc2026-e83c1.firebasestorage.app",
            messagingSenderId: "42889646682",
            appId: "1:42889646682:web:1c06b29c9f57bfe959fe63"
        };

        const app = initializeApp(firebaseConfig);
        const db  = getFirestore(app);

        // ── Trạng thái ──
        const daysInMonth = 31;
        const today = new Date().getDate();
        let emotionsData = {};

        // ── Khởi tạo dropdown ngày ──
        const daySelect = document.getElementById('daySelect');
        for (let i = 1; i <= daysInMonth; i++) {
            daySelect.innerHTML += `<option value="${i}">Ngày ${i}</option>`;
        }
        if (today <= daysInMonth) daySelect.value = today;

        // ── Lắng nghe Firestore realtime (collection "emotions2026") ──
        // Mỗi document = 1 ngày, field "emoji" lưu cảm xúc
        const colRef = collection(db, "emotions2026");

        onSnapshot(colRef,
            (snapshot) => {
                emotionsData = {};
                snapshot.forEach(docSnap => {
                    emotionsData[docSnap.id] = docSnap.data().emoji;
                });
                updateUI();
                setStatus('connected');
                document.getElementById('saveBtn').disabled = false;
            },
            (err) => {
                console.error("Firestore lỗi:", err);
                setStatus('error');
            }
        );

        // ── Lưu cảm xúc lên Firestore ──
        window.saveEmotion = async function () {
            const day     = daySelect.value;
            const emotion = document.getElementById('emotionSelect').value;

            try {
                await setDoc(doc(db, "emotions2026", String(day)), { emoji: emotion });
                showToast();
            } catch (e) {
                console.error("Lưu thất bại:", e);
                alert("❌ Lưu thất bại. Kiểm tra kết nối hoặc Firebase Rules nhé!");
            }
        };

        // ── Render calendar ──
        function renderCalendar() {
            const calendar = document.getElementById('calendar');
            calendar.innerHTML = '';
            for (let i = 1; i <= daysInMonth; i++) {
                const emoji  = emotionsData[String(i)] || '🤍';
                const isToday = i === today ? 'today' : '';
                calendar.innerHTML += `
                    <div class="day-box ${isToday}">
                        <div class="day-num">${i}</div>
                        <div class="day-emoji">${emoji}</div>
                    </div>`;
            }
        }

        // ── Render stats ──
        function renderStats() {
            const statsContainer = document.getElementById('stats');
            const counts = {};
            Object.values(emotionsData).forEach(e => { counts[e] = (counts[e] || 0) + 1; });
            statsContainer.innerHTML = '';
            if (Object.keys(counts).length === 0) {
                statsContainer.innerHTML = '<p style="grid-column:1/-1;color:#999">Bạn chưa ghi lại cảm xúc nào. Hãy bắt đầu nhé! 🌸</p>';
                return;
            }
            for (const [emoji, count] of Object.entries(counts)) {
                statsContainer.innerHTML += `
                    <div class="stat-item"><span>${emoji}</span> ${count} ngày</div>`;
            }
        }

        function updateUI() { renderCalendar(); renderStats(); }

        // ── Status badge ──
        function setStatus(state) {
            const badge = document.getElementById('statusBadge');
            const text  = document.getElementById('statusText');
            badge.className = 'status-badge ' + state;
            if (state === 'connected') text.textContent = 'Đã kết nối Firebase ☁️';
            else if (state === 'error') text.textContent = 'Lỗi kết nối Firebase';
            else text.textContent = 'Đang kết nối Firebase…';
        }

        // ── Toast ──
        function showToast() {
            const t = document.getElementById('toast');
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 2500);
        }
    </script>
</body>
</html>
